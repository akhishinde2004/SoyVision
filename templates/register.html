<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – SoyVision</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #16a34a; --green-light: #22c55e; --green-bg: #f0fdf4; --text: #111827; --text-muted: #6b7280; --border: #e5e7eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: white; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 440px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .auth-header { text-align: center; margin-bottom: 28px; }
        .brand-icon { width:56px; height:56px; background:var(--green); border-radius:14px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px; }
        .brand-icon i { color:white; font-size:22px; }
        .auth-header h1 { font-size:1.4rem; font-weight:700; color:var(--text); margin-bottom:4px; }
        .auth-header p { font-size:0.88rem; color:var(--text-muted); }
        .form-group { margin-bottom: 14px; }
        .form-label { font-size:0.85rem; font-weight:600; color:var(--text); margin-bottom:5px; display:block; }
        .input-wrap { position: relative; }
        .input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px; }
        .form-control {
            width:100%; padding:11px 14px 11px 38px;
            border:1.5px solid var(--border); border-radius:10px;
            font-size:0.9rem; font-family:'Plus Jakarta Sans',sans-serif;
            transition:border-color 0.2s, box-shadow 0.2s; outline:none;
        }
        .form-control:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(22,163,74,0.1); }
        .btn-submit {
            width:100%; padding:12px; background:var(--green); color:white;
            border:none; border-radius:10px; font-size:0.95rem; font-weight:600;
            cursor:pointer; transition:all 0.2s; font-family:'Plus Jakarta Sans',sans-serif; margin-top:6px;
        }
        .btn-submit:hover { background:#15803d; transform:translateY(-1px); box-shadow:0 6px 16px rgba(22,163,74,0.3); }
        .divider { text-align:center; margin:18px 0; position:relative; color:var(--text-muted); font-size:0.82rem; }
        .divider::before, .divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
        .divider::before { left:0; } .divider::after { right:0; }
        .btn-outline {
            width:100%; padding:11px; border:1.5px solid var(--green); color:var(--green);
            background:transparent; border-radius:10px; font-size:0.9rem; font-weight:600;
            text-decoration:none; display:block; text-align:center; transition:all 0.2s;
        }
        .btn-outline:hover { background:var(--green); color:white; }
        .alert-msg { padding:11px 14px; border-radius:10px; font-size:0.85rem; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
        .alert-danger { background:#fef2f2; color:#dc2626; border-left:3px solid #dc2626; }
        .alert-success { background:var(--green-bg); color:var(--green); border-left:3px solid var(--green); }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <div class="brand-icon"><i class="fas fa-leaf"></i></div>
        <h1>Create Account</h1>
        <p>Join SoyVision today</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert-msg alert-{{ 'danger' if category == 'error' else 'success' }}">
        <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' }}"></i>{{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrap">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
            </div>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-user-plus me-2"></i>Create Account</button>
    </form>

    <div class="divider">Already have an account?</div>
    <a href="{{ url_for('login') }}" class="btn-outline"><i class="fas fa-sign-in-alt me-2"></i>Sign In</a>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
