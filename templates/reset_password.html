<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – SoyVision</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing:border-box;margin:0;padding:0; }
        body { font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 50%,#bbf7d0 100%);display:flex;align-items:center;justify-content:center;padding:20px; }
        .auth-card { background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 40px rgba(0,0,0,0.08);border:1px solid #e5e7eb;animation:slideUp 0.4s ease; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
        .auth-header { text-align:center;margin-bottom:28px; }
        .brand-icon { width:56px;height:56px;background:#16a34a;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px; }
        .brand-icon i { color:white;font-size:22px; }
        .auth-header h1 { font-size:1.4rem;font-weight:700;color:#111827;margin-bottom:4px; }
        .auth-header p { font-size:0.88rem;color:#6b7280; }
        .form-group { margin-bottom:14px; }
        .form-label { font-size:0.85rem;font-weight:600;color:#111827;margin-bottom:5px;display:block; }
        .input-wrap { position:relative; }
        .input-wrap i { position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:13px; }
        .form-control { width:100%;padding:11px 14px 11px 38px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:0.9rem;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;outline:none; }
        .form-control:focus { border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,0.1); }
        .btn-submit { width:100%;padding:12px;background:#16a34a;color:white;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif;margin-top:6px; }
        .btn-submit:hover { background:#15803d;transform:translateY(-1px); }
        .back-link { text-align:center;margin-top:16px; }
        .back-link a { font-size:0.85rem;color:#16a34a;text-decoration:none;font-weight:500; }
        .alert-msg { padding:11px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:14px;display:flex;align-items:center;gap:8px; }
        .alert-danger { background:#fef2f2;color:#dc2626;border-left:3px solid #dc2626; }
        .alert-success { background:#f0fdf4;color:#16a34a;border-left:3px solid #22c55e; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <div class="brand-icon"><i class="fas fa-lock"></i></div>
        <h1>New Password</h1>
        <p>Enter your new password below</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert-msg alert-{{ 'danger' if category == 'error' else 'success' }}">
        <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' }}"></i>
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required minlength="6">
            </div>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-check me-2"></i>Reset Password</button>
    </form>
    <div class="back-link"><a href="{{ url_for('login') }}"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
